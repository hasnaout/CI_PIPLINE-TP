name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recupérer le code
        uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer le Linter
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --sttistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 app --count --max-line-length=127 --statistics
      - name: Lancer les tests
        run: python -m pytest -v --cov=app  