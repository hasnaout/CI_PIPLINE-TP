name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Recupérer le code
        uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer le Linter
        run: |
          flake8 app tests --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app tests --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 app tests --count --max-line-length=127 --statistics
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Recupérer le code
      uses: actions/checkout@v4
    - name: Installer Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.11"
    - name: Installer les dépendances
      run: pip install -r requirements.txt
    - name: Execute pytest
      run : python -m pytest tests/ -v --cov=app

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Recupérer le code
      uses: actions/checkout@v4
    - name: Installer Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.11"
    - name: Installer les dépendances
      run: pip install -r requirements.txt
    - name: Genere package python
      run : python -m build 
    - name: Uploid resultat
      uses: actions/upload-artifact@v6
      with:
        name: dist-files
        path: dist/
